<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renato Cajal | Links</title>
    
    <!-- Importando fontes elegantes do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        /* Variáveis de Cores */
        :root {
            --bg-color: #000000;
            --gold: #d4af37;
            --text-light: #e0e0e0;
        }

        /* Reset e Configurações Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Container Principal */
        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        /* Foto de Perfil */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top; /* Garante que o rosto fique bem centralizado */
            border: 3px solid var(--gold);
            padding: 4px; /* Cria um anel duplo elegante */
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            background-color: #fff; /* Fundo branco caso a imagem tenha transparência */
        }

        /* Textos */
        .name {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .description {
            font-size: 14px;
            font-weight: 300;
            line-height: 1.6;
            color: #b3b3b3;
            margin-bottom: 35px;
            padding: 0 10px;
        }

        /* Botões */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 16px 20px;
            background-color: transparent;
            color: var(--gold);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: 1px solid var(--gold);
            border-radius: 8px; /* Bordas levemente arredondadas para sofisticação */
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Efeito de Hover (Passar o mouse) nos Botões */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: var(--gold);
            transition: all 0.4s ease;
            z-index: -1;
        }

        .link-btn:hover {
            color: var(--bg-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
            border-color: var(--gold);
        }

        .link-btn:hover::before {
            left: 0;
        }

        /* Animação de Entrada Suave */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- AQUI ESTÁ A REFERÊNCIA PARA A SUA FOTO -->
        <img src="perfil.jpg" alt="Renato Cajal" class="profile-img">
        
        <h1 class="name">Renato Cajal</h1>
        <p class="description">Reiki Master, numerólogo cabalístico, tarot terapêutico, social manager.</p>
        
        <div class="links-container">
            <a href="https://www.instagram.com/reiki_1974/" target="_blank" class="link-btn">Instagram</a>
            <a href="https://www.facebook.com/renato.araujo.564" target="_blank" class="link-btn">Facebook</a>
            <a href="#" class="link-btn">Essência Maçônica</a>
            <a href="https://wa.link/05usdm" target="_blank" class="link-btn">Contato</a>
        </div>

    </div>

</body>
</html>
